<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | StreamNest</title>
<!-- Google Font -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet"/>
<!-- Main CSS -->
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="login-container">
<!-- Left Side -->
<div class="login-left">
<div class="brand">
<i class="fa-solid fa-circle-play"></i>
<h1>Stream<span>Nest</span></h1>
</div>
<h2>

                Welcome Back

            </h2>
<p>

                Sign in to continue uploading videos,
                managing your content and growing your audience.

            </p>
<img alt="Login Illustration" src="images/login-illustration.png"/>
</div>
<!-- Right Side -->
<div class="login-right">
<form action="#" id="loginForm" method="POST" novalidate="">
<h2>

                    Login

                </h2>
<p>

                    Enter your account details below.

                </p>
<div class="input-group">
<label for="email">Email Address</label>
<input autocomplete="email" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
<div class="input-group">
<label for="password">Password</label>
<input autocomplete="current-password" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
<div class="remember-row">
<label>
<input id="rememberMe" name="rememberMe" type="checkbox"/>

                        Remember Me

                    </label>
<a href="#">

                        Forgot Password?

                    </a>
</div>
<button class="btn-primary full-width" id="loginButton" type="submit">
<i class="fa-solid fa-right-to-bracket"></i>

                    Login

                </button>
<div class="form-message" id="loginMessage"></div>
<div class="loader hidden" id="loginLoader"></div>
<div class="divider">
<span>OR</span>
</div>
<button class="google-btn" id="googleLoginButton" type="button">
<i class="fa-brands fa-google"></i>

                    Continue with Google

                </button>
<p class="register-link">

                    Don't have an account?

                    <a href="register.html" id="registerLink">

                        Create One

                    </a>
</p>
<p class="home-link">
<a href="index.html" id="homeLink">

                        ← Back to Home

                    </a>
</p>
</form>
</div>
</div>

<script src="js/config.js"></script><script src="js/app.js"></script><script src="js/login.js"></script></body>
</html>
