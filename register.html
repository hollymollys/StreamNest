<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | StreamNest</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="login-container">

    <!-- ===========================
            LEFT PANEL
    ============================ -->

    <div class="login-left">

        <div class="brand">

            <i class="fa-solid fa-circle-play"></i>

            <h1>

                Stream<span>Nest</span>

            </h1>

        </div>

        <h2>

            Become A Creator

        </h2>

        <p>

            Join thousands of creators already sharing videos,
            image galleries and engaging with audiences worldwide.

        </p>

        <img
            src="images/register-illustration.png"
            alt="Register Illustration">

    </div>



    <!-- ===========================
            RIGHT PANEL
    ============================ -->

    <div class="login-right">

        <form id="registerForm">

            <h2>

                Create Account

            </h2>

            <p>

                Fill in your information below to get started.

            </p>



            <!-- Full Name -->

            <div class="input-group">

                <label for="fullname">

                    Full Name

                </label>

                <input
                    type="text"
                    id="fullname"
                    name="fullname"
                    placeholder="John Doe"
                    autocomplete="name"
                    required>

            </div>



            <!-- Email -->

            <div class="input-group">

                <label for="email">

                    Email Address

                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required>

            </div>



            <!-- Username -->

            <div class="input-group">

                <label for="username">

                    Username

                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="johncreator"
                    autocomplete="username"
                    required>

            </div>
            <!-- Password -->

            <div class="input-group">

                <label for="password">

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a strong password"
                    autocomplete="new-password"
                    required>

            </div>



            <!-- Confirm Password -->

            <div class="input-group">

                <label for="confirmPassword">

                    Confirm Password

                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm your password"
                    autocomplete="new-password"
                    required>

            </div>



            <!-- Terms & Conditions -->

            <div class="remember-row">

                <label>

                    <input
                        type="checkbox"
                        id="terms"
                        name="terms"
                        required>

                    I agree to the
                    <a href="#">Terms & Conditions</a>

                </label>

            </div>



            <!-- Registration Message -->

            <div
                id="registerMessage"
                class="form-message">

            </div>



            <!-- Loading Spinner -->

            <div
                id="registerLoader"
                class="loader hidden">

            </div>



            <!-- Register Button -->

            <button
                id="registerButton"
                type="submit"
                class="btn-primary full-width">

                <i class="fa-solid fa-user-plus"></i>

                Create Account

            </button>



            <div class="divider">

                <span>

                    OR

                </span>

            </div>



            <!-- Google Sign Up -->

            <button
                id="googleRegisterButton"
                type="button"
                class="google-btn">

                <i class="fa-brands fa-google"></i>

                Continue with Google

            </button>



            <p class="register-link">

                Already have an account?

                <a
                    id="loginLink"
                    href="login.html">

                    Login

                </a>

            </p>



            <p class="home-link">

                <a
                    id="homeLink"
                    href="index.html">

                    ← Back to Home

                </a>

            </p>

        </form>

    </div>

</div>

<!-- Register Page JavaScript -->

<script src="js/register.js"></script>

</body>

</html>
