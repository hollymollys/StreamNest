<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | StreamNest</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="login-container">

        <!-- Left Panel -->

        <div class="login-left">

            <div class="brand">

                <i class="fa-solid fa-circle-play"></i>

                <h1>Stream<span>Nest</span></h1>

            </div>

            <h2>

                Become A Creator

            </h2>

            <p>

                Create your free StreamNest account and begin
                uploading videos and image galleries to your audience.

            </p>

            <img src="images/register-illustration.png"
                 alt="Register Illustration">

        </div>



        <!-- Right Panel -->

        <div class="login-right">

            <form id="registerForm">

                <h2>

                    Create Account

                </h2>

                <p>

                    Fill in your details below.

                </p>



                <div class="input-group">

                    <label>Full Name</label>

                    <input
                        type="text"
                        id="fullname"
                        placeholder="John Doe"
                        required>

                </div>



                <div class="input-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        required>

                </div>



                <div class="input-group">

                    <label>Username</label>

                    <input
                        type="text"
                        id="username"
                        placeholder="johncreator"
                        required>

                </div>



                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Create a password"
                        required>

                </div>



                <div class="input-group">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required>

                </div>



                <div class="remember-row">

                    <label>

                        <input
                            type="checkbox"
                            required>

                        I agree to the Terms & Conditions

                    </label>

                </div>



                <button
                    type="submit"
                    class="btn-primary full-width">

                    <i class="fa-solid fa-user-plus"></i>

                    Create Account

                </button>



                <div class="divider">

                    <span>OR</span>

                </div>



                <button
                    type="button"
                    class="google-btn">

                    <i class="fa-brands fa-google"></i>

                    Sign Up With Google

                </button>



                <p class="register-link">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </p>



                <p class="home-link">

                    <a href="index.html">

                        ← Back to Home

                    </a>

                </p>

            </form>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
