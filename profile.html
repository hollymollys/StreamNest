<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Profile | StreamNest</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="dashboard">

    <!-- ===========================
            SIDEBAR
    ============================ -->

    <aside class="sidebar">

        <div class="brand">

            <i class="fa-solid fa-circle-play"></i>

            <h2>

                Stream<span>Nest</span>

            </h2>

        </div>

        <div class="profile-summary">

            <img
                id="sidebarProfileImage"
                src="images/default-avatar.png"
                alt="Profile">

            <h3 id="sidebarProfileName">

                Loading...

            </h3>

            <p id="sidebarAccountType">

                Creator

            </p>

        </div>

        <ul class="sidebar-menu">

            <li>

                <a href="home.html">

                    <i class="fa-solid fa-house"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="upload.html">

                    <i class="fa-solid fa-upload"></i>

                    Upload

                </a>

            </li>

            <li class="active">

                <a href="profile.html">

                    <i class="fa-solid fa-user"></i>

                    Profile

                </a>

            </li>

            <li>

                <a
                    id="logoutButton"
                    href="#">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>



    <!-- ===========================
            MAIN CONTENT
    ============================ -->

    <main class="main-content">

        <header class="topbar">

            <div>

                <h1>

                    My Profile

                </h1>

                <p>

                    Manage your account information and profile settings.

                </p>

            </div>

        </header>



        <section class="profile-container">

            <form
                id="profileForm"
                enctype="multipart/form-data">

                <div
                    id="profileMessage"
                    class="form-message">

                </div>



                <!-- Profile Picture -->

                <div class="profile-picture-section">

                    <img
                        id="profileImage"
                        src="images/default-avatar.png"
                        alt="Profile Picture">

                    <input
                        type="file"
                        id="profilePhoto"
                        name="profilePhoto"
                        accept="image/*">

                    <button
                        id="changePhotoButton"
                        type="button"
                        class="btn-secondary">

                        Change Photo

                    </button>

                </div>



                <!-- Personal Information -->

                <div class="form-grid">

                    <div class="input-group">

                        <label for="fullname">

                            Full Name

                        </label>

                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            autocomplete="name"
                            required>

                    </div>



                    <div class="input-group">

                        <label for="username">

                            Username

                        </label>

                        <input
                            type="text"
                            id="username"
                            name="username"
                            autocomplete="username"
                            required>

                    </div>



                    <div class="input-group">

                        <label for="email">

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            autocomplete="email"
                            required>

                    </div>



                    <div class="input-group">

                        <label for="phone">

                            Phone Number

                        </label>

                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="+234..."
                            autocomplete="tel">

                    </div>
                    <div class="input-group">

                        <label for="bio">

                            Bio

                        </label>

                        <textarea
                            id="bio"
                            name="bio"
                            rows="5"
                            placeholder="Tell your audience about yourself..."></textarea>

                    </div>



                    <div class="input-group">

                        <label for="country">

                            Country

                        </label>

                        <input
                            type="text"
                            id="country"
                            name="country"
                            placeholder="Nigeria">

                    </div>

                </div>



                <!-- Account Information -->

                <section class="content-section">

                    <div class="section-header">

                        <h2>

                            Account Information

                        </h2>

                    </div>

                    <div class="form-grid">

                        <div class="input-group">

                            <label>

                                Account Type

                            </label>

                            <input
                                id="accountType"
                                type="text"
                                value="Creator"
                                readonly>

                        </div>

                        <div class="input-group">

                            <label>

                                Member Since

                            </label>

                            <input
                                id="memberSince"
                                type="text"
                                readonly>

                        </div>

                    </div>

                </section>



                <!-- Statistics -->

                <section class="content-section">

                    <div class="section-header">

                        <h2>

                            Creator Statistics

                        </h2>

                    </div>

                    <div class="stats-grid">

                        <div class="dashboard-card">

                            <i class="fa-solid fa-video"></i>

                            <h2 id="videoCount">

                                0

                            </h2>

                            <p>

                                Videos

                            </p>

                        </div>

                        <div class="dashboard-card">

                            <i class="fa-solid fa-eye"></i>

                            <h2 id="viewCount">

                                0

                            </h2>

                            <p>

                                Views

                            </p>

                        </div>

                        <div class="dashboard-card">

                            <i class="fa-solid fa-users"></i>

                            <h2 id="followersCount">

                                0

                            </h2>

                            <p>

                                Followers

                            </p>

                        </div>

                        <div class="dashboard-card">

                            <i class="fa-solid fa-hard-drive"></i>

                            <h2 id="storageUsed">

                                0 MB

                            </h2>

                            <p>

                                Storage Used

                            </p>

                        </div>

                    </div>

                </section>



                <!-- Buttons -->

                <div class="button-group">

                    <button
                        id="saveProfileButton"
                        type="submit"
                        class="btn-primary">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Changes

                    </button>

                    <button
                        id="changePasswordButton"
                        type="button"
                        class="btn-outline">

                        <i class="fa-solid fa-lock"></i>

                        Change Password

                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<!-- Shared JavaScript -->

<script src="js/app.js"></script>

<!-- Profile Page Logic -->

<script src="js/profile.js"></script>

</body>

</html>
