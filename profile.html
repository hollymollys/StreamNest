<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Profile | StreamNest</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet"/>
<!-- Main CSS -->
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="dashboard">
<!-- ===========================
            SIDEBAR
    ============================ -->
<aside class="sidebar">
<div class="brand">
<i class="fa-solid fa-circle-play"></i>
<h2>

                Stream<span>Nest</span>
</h2>
</div>
<div class="profile-summary">
<img alt="Profile" id="sidebarProfileImage" src="images/default-avatar.png"/>
<h3 id="sidebarProfileName">

                Loading...

            </h3>
<p id="sidebarProfileRole">

                Creator

            </p>
</div>
<ul class="sidebar-menu">
<li>
<a href="home.html">
<i class="fa-solid fa-house"></i>

                    Dashboard

                </a>
</li>
<li>
<a href="upload.html">
<i class="fa-solid fa-upload"></i>

                    Upload

                </a>
</li>
<li class="active">
<a href="profile.html">
<i class="fa-solid fa-user"></i>

                    Profile

                </a>
</li>
<li>
<a href="#" id="logoutButton">
<i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </a>
</li>
</ul>
</aside>
<!-- ===========================
            MAIN CONTENT
    ============================ -->
<main class="main-content">
<header class="topbar">
<div>
<h1>

                    My Profile

                </h1>
<p>

                    Manage your account information and profile settings.

                </p>
</div>
</header>
<section class="profile-container">
<form action="#" id="profileForm" method="POST" novalidate="">
<div class="form-message" id="profileMessage">
</div>
<!-- Profile Picture -->
<div class="profile-picture-section">
<img alt="Profile Picture" id="profileImage" src="images/default-avatar.png"/>
<input accept="image/*" id="profilePhoto" name="profilePhoto" type="file"/>
<button class="btn-secondary" id="changePhotoButton" type="button">

                        Change Photo

                    </button>
</div>
<!-- Personal Information -->
<div class="form-grid">
<div class="input-group">
<label for="fullname">

                            Full Name

                        </label>
<input id="displayFullname" name="fullname" type="text"/>
</div>
<div class="input-group">
<label for="username">

                            Username

                        </label>
<input id="username" name="username" type="text"/>
</div>
<div class="input-group">
<label for="email">

                            Email Address

                        </label>
<input autocomplete="email" id="email" name="email" required="" type="email"/>
</div>
<div class="input-group">
<label for="phone">

                            Phone Number

                        </label>
<input autocomplete="tel" id="phone" name="phone" placeholder="+234..." type="tel"/>
</div>
<div class="input-group">
<label for="bio">

                            Bio

                        </label>
<textarea id="bio" name="bio" placeholder="Tell your audience about yourself..." rows="5"></textarea>
</div>
<div class="input-group">
<label for="country">

                            Country

                        </label>
<input id="country" name="country" placeholder="Nigeria" type="text"/>
</div>
</div>
<!-- Account Information -->
<section class="content-section">
<div class="section-header">
<h2>

                            Account Information

                        </h2>
</div>
<div class="form-grid">
<div class="input-group">
<label>

                                Account Type

                            </label>
<input id="accountType" readonly="" type="text" value="Creator"/>
</div>
<div class="input-group">
<label>

                                Member Since

                            </label>
<input id="memberSince" readonly="" type="text"/>
</div>
</div>
</section>
<!-- Statistics -->
<section class="content-section">
<div class="section-header">
<h2>

                            Creator Statistics

                        </h2>
</div>
<div class="stats-grid">
<div class="dashboard-card">
<i class="fa-solid fa-video"></i>
<h2 id="videoCount">

                                0

                            </h2>
<p>

                                Videos

                            </p>
</div>
<div class="dashboard-card">
<i class="fa-solid fa-eye"></i>
<h2 id="viewCount">

                                0

                            </h2>
<p>

                                Views

                            </p>
</div>
<div class="dashboard-card">
<i class="fa-solid fa-users"></i>
<h2 id="followerCount">

                                0

                            </h2>
<p>

                                Followers

                            </p>
</div>
<div class="dashboard-card">
<i class="fa-solid fa-hard-drive"></i>
<h2 id="storageCount">

                                0 MB

                            </h2>
<p>

                                Storage Used

                            </p>
</div>
</div>
</section>
<!-- Buttons -->
<div class="button-group">
<button class="btn-primary" id="saveProfileButton" type="submit">
<i class="fa-solid fa-floppy-disk"></i>

                        Save Changes

                    </button>
<button class="btn-outline" id="changePasswordButton" type="button">
<i class="fa-solid fa-lock"></i>

                        Change Password

                    </button>
</div>
</form>
</section>
</main>
</div>
<!-- Shared JavaScript -->

<!-- Profile Page Logic -->

<script src="js/config.js"></script><script src="js/app.js"></script><script src="js/profile.js"></script></body>
</html>
